name: Deploy Backend
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /var/www/sarvatirthamayi_site/backend
            git pull origin main
            npm install
            pm2 restart all
            # 2. Update Frontend
            cd /var/www/sarvatirthamayi_site/frontend
            git pull origin main
            npm install
            npm run build
