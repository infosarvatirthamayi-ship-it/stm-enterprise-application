name: STM Enterprise Production CI/CD

# Trigger this pipeline ONLY when code is pushed to the 'main' branch
on:
  push:
    branches: [ "main" ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v3

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x' # Match your server's Node version

    - name: 📦 Install Dependencies
      run: npm ci # Strict, clean install

    - name: 🧪 Run Unit & Functional Tests (QA Phase)
      run: npm run test # Will skip if no tests exist yet, but ready for future

    # 🚀 THE DEPLOYMENT STEP (Runs only if tests pass)
    - name: 🌐 Deploy to Production Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PROD_SERVER_IP }}
        username: ${{ secrets.PROD_SERVER_USER }}
        key: ${{ secrets.PROD_SSH_KEY }}
        script: |
          # 1. Navigate to the app directory
          cd /var/www/stm-backend
          
          # 2. Configure Git Identity
          git config --global user.email "infosarvatirthamayi@gmail.com"
          git config --global user.name "STM CI/CD Bot"
          
          # 3. Pull latest code securely
          git pull origin main
          
          # 4. Install any new dependencies
          npm install --production
          
          # 5. Restart the server cleanly (Assuming PM2 is used for process management)
          pm2 reload stm-backend --update-env